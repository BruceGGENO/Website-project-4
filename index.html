<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="dist/output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Website project template</title>
</head>


<body class="bg-[#EFECEA] font-custom">
    <div id="header"></div>
    <div id="hero"></div>
    <div id="menu"></div>
    <div id="footer"></div>
</body>
<script>
    const loadComponents = (id, url) => {
        fetch(url)
            .then((response) => response.text())
            .then((html) => {
                document.getElementById(id).innerHTML = html;
            });
    };



    window.onload = () => {
        loadComponents("header", "src/sections/header.html");
        loadComponents("hero", "src/sections/hero.html");
        loadComponents("contact", "src/sections/contact.html");
        loadComponents("footer", "src/sections/footer.html");
        loadComponents('menu', 'src/sections/menu.html');
        loadComponents('dataprivacy', 'src/sections/dataprivacy.html');
    };

    function setupMenuToggle() {
        const menuBtn = document.querySelector("#menu img");

        if (!menuBtn) {
            setTimeout(setupMenuToggle, 50);
            return;
        }

        menuBtn.addEventListener("click", function () {
            if (this.src.includes("menu.png")) {
                this.src = "vectors/close.png";
            } else {
                this.src = "vectors/menu.png";
            }
        });
    }
</script>

</html>
