<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Vector shapes</title>
  </head>
  <body class="bg-[#F5F3EF]">
    <section class="relative h-screen overflow-hidden">
      <!--vectors  -->
      <div class="absolute inset-0">
        <!-- vector-Yellow -->
        <img
          src="./src/vectors/Vector-yellow.png"
          class="absolute top-48 left-40 w-[350px]"
          alt=""
        />

        <!--vector-Pink -->
        <img
          src="./src/vectors/Vector-pink.png"
          class="absolute top-48 left-[640px] w-24"
          alt=""
        />

        <!-- vector-green -->
        <img
          src="./src/vectors/Vector-green.png"
          class="absolute top-72 left-24 w-[320px]"
          alt=""
        />

        <!-- vector-blue -->
        <img
          src="./src/vectors/Vector-blue.png"
          class="absolute top-72 left-[470px] w-[290px]"
          alt=""
        />

        <!-- vector-red -->
        <img
          src="./src/vectors/Vector-red.png"
          class="absolute top-[540px] left-[240px] w-[380px]"
          alt=""
        />
      </div>

      <div
        class="absolute z-20 top-[470px] left-1/2 -translate-x-1/2 text-center w-[450px]"
      >
        <h2 class="text-white text-5xl font-semibold leading-tight">
          We help you set <br />

          focus and gain <br />

          impact. By adding <br />

          to the conversation, <br />

          not to the noise.
        </h2>
      </div>
    </section>
  </body>
</html>
