<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Hero-Section</title>
  </head>
  <body>
    <div class="lg:min-h-162.5">
      <div class="relative mx-auto">
        <div class="relative">
          <div class="relative flex lg:hidden">
            <div class="h-[106.6vw]">
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../vectors/vector-sm-pink.svg"
                  class="sticky h-[106.6vw] top-[-2.3vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../vectors/vector-sm-green-left.svg"
                  class="sticky h-[106.6vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../vectors/vector-sm-yellow.svg"
                  class="sticky h-[106.6vw] top-0"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../vectors/vector-sm-blue.svg"
                  class="sticky h-[106.6vw] top-[-18.4vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../vectors/vector-sm-red.svg"
                  class="sticky h-[106.6vw] top-[-53.6vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[150vw] w-full">
                <img
                  src="../../vectors/vector-sm-green-right.svg"
                  class="sticky h-[106.6vw] top-[-13.8vw]"
                />
              </div>
            </div>
          </div>
          <div class="relative hidden lg:flex">
            <div class="h-[73vw]">
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../vectors/vector-lg-pink.svg"
                  class="sticky h-[68vw] top-[-1.6vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../vectors/vector-lg-green-left.svg"
                  class="sticky h-[68vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../vectors/vector-lg-yellow.svg"
                  class="sticky h-[68vw] top-0"
                />
              </div>
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../vectors/vector-lg-red.svg"
                  class="sticky h-[68vw] top-[-33.7vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[100vw] w-full">
                <img
                  src="../../vectors/vector-green-lg-right.svg"
                  class="sticky h-[68vw] top-[-9.8vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[110vw] w-full">
                <img
                  src="../../vectors/vector-lg-blue.svg"
                  class="sticky h-[78vw] top-[-7.0vw] bottom-[-8.0vw]"
                />
              </div>
            </div>
          </div>

          <div
            class="absolute -top-2 flex justify-center items-center w-full h-full"
          >
            <h1
              class="text-white text-2xl md:text-4xl lg:text-5xl text-center w-60 md:w-84 lg:w-md"
            >
              We help you set focus and gain impact. By adding to the
              conversation, not to the noise.
            </h1>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
