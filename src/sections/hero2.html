<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
  </head>
  <body>
    <div class="lg:min-h-[650px]">
      <div class="relative mx-auto hero">
        <div class="relative">
          <div class="relative flex lg:hidden">
            <div class="h-[106.6vw]">
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../src/vectors/Vector-pink.png"
                  class="sticky h-[106.6vw] top-[-2.3vw] left-1/2 -translate-x-1/2"
                />
              </div>
              <!-- small vector-shapes -->
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../src/vectors/Vector-green.png"
                  class="sticky h-[106.6vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../src/vectors/Vector-yellow.png"
                  class="sticky h-[106.6vw] top-0 left-1/2 -translate-x-1/2"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../src/vectors/Vector-blue.png"
                  class="sticky h-[106.6vw] top-[-18.4vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[140vw] w-full">
                <img
                  src="../../src/vectors/Vector-red.png"
                  class="sticky h-[106.6vw] top-[-53.6vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[150vw] w-full">
                <img
                  src="../../src/vector_lg/lg-vector-green-right.png"
                  class="sticky h-[106.6vw] top-[-13.8vw]"
                />
              </div>
            </div>
          </div>
          <div class="relative hidden lg:flex">
            <!-- large vector-shape  -->
            <div class="h-[73vw]">
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../src/vectors/"
                  class="sticky h-[68vw] top-[-1.6vw] left-1/2 -translate-x-1/2"
                />
              </div>
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../public/lggreen-side-hero-section.svg"
                  class="sticky h-[68vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../src/vector_lg/lg-vector-yellow.png"
                  class="sticky h-[68vw] top-0 left-1/2 -translate-x-1/2"
                />
              </div>
              <div class="absolute top-0 left-0 h-[90vw] w-full">
                <img
                  src="../../src/vector_lg/lg-vector-red.png"
                  class="sticky h-[68vw] top-[-33.7vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[100vw] w-full">
                <img
                  src="../../src/vector_lg/lg-vector-green-right.png"
                  class="sticky h-[68vw] top-[-9.8vw]"
                />
              </div>
              <div class="absolute top-0 left-0 h-[100vw] w-full">
                <img
                  src="../../src/vectors/Vector-blue.png"
                  class="sticky h-[68vw] top-[-4.7vw]"
                />
              </div>
            </div>
          </div>

          <div
            class="absolute -top-2 flex justify-center items-center w-full h-full"
          >
            <h1
              class="text-white text-2xl md:text-4xl lg:text-5xl text-center w-[15rem] md:w-[21rem] lg:w-[28rem]"
            >
              We help you set focus and gain impact. By adding to the
              conversation, not to the noise.
            </h1>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
